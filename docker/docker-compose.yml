name: life-dashboard

services:
  backend:
    build: ../backend
    env_file:
      - ../.env
    environment:
      RUN_MIGRATIONS: "1"
    volumes:
      - ${GARMIN_TOKENS_DIR_HOST:-~/.garminconnect}:/data/garmin
      - ${VERTEX_SERVICE_ACCOUNT_JSON_HOST:-./secrets/vertex-service-account.json}:/secrets/vertex-service-account.json:ro
    ports:
      - '8000:8000'

  frontend:
    image: node:20-bullseye
    working_dir: /app
    env_file:
      - ../.env
    environment:
      CHOKIDAR_USEPOLLING: "1"
      VITE_DEV_PORT: "4173"
      VITE_PROXY_TARGET: "http://backend:8000"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "npm install &&
             npm run dev -- --host 0.0.0.0 --port ${VITE_DEV_PORT:-4173} --strictPort"
    ports:
      - '4173:4173'

volumes:
  frontend_node_modules:
