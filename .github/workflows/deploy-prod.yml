name: Deploy (prod)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM Run Command
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_WORKDIR: ${{ secrets.EC2_WORKDIR }}
        run: |
          set -euo pipefail

          : "${EC2_INSTANCE_ID:?Missing secret EC2_INSTANCE_ID}"

          EC2_USER="${EC2_USER:-ec2-user}"
          EC2_WORKDIR="${EC2_WORKDIR:-/opt/life-dashboard}"
          SSM_POLL_INTERVAL_SECONDS="${SSM_POLL_INTERVAL_SECONDS:-10}"
          SSM_WAIT_TIMEOUT_SECONDS="${SSM_WAIT_TIMEOUT_SECONDS:-1800}"

          DEPLOY_CMD="sudo -iu ${EC2_USER} ${EC2_WORKDIR}/deploy/deploy_prod.sh"
          echo "Deploy command: ${DEPLOY_CMD}"

          COMMAND_ID="$(
            aws ssm send-command \
              --instance-ids "${EC2_INSTANCE_ID}" \
              --document-name "AWS-RunShellScript" \
              --comment "Life-Dashboard deploy from ${GITHUB_SHA}" \
              --parameters "commands=[\"${DEPLOY_CMD}\"]" \
              --query "Command.CommandId" \
              --output text
          )"

          echo "SSM CommandId: ${COMMAND_ID}"

          # The built-in waiter exits after ~100s, which is too short for image builds.
          START_TS="$(date +%s)"
          while true; do
            NOW_TS="$(date +%s)"
            ELAPSED_SECONDS="$((NOW_TS - START_TS))"

            if ! STATUS="$(aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${EC2_INSTANCE_ID}" --query Status --output text 2>/dev/null)"; then
              if [ "${ELAPSED_SECONDS}" -ge "${SSM_WAIT_TIMEOUT_SECONDS}" ]; then
                STATUS="Unknown"
                echo "ERROR: Timed out waiting ${SSM_WAIT_TIMEOUT_SECONDS}s for SSM command metadata."
                break
              fi

              echo "SSM invocation not ready yet (${ELAPSED_SECONDS}s elapsed); retrying in ${SSM_POLL_INTERVAL_SECONDS}s..."
              sleep "${SSM_POLL_INTERVAL_SECONDS}"
              continue
            fi

            echo "SSM status: ${STATUS} (${ELAPSED_SECONDS}s elapsed)"

            case "${STATUS}" in
              Pending|Delayed|InProgress)
                if [ "${ELAPSED_SECONDS}" -ge "${SSM_WAIT_TIMEOUT_SECONDS}" ]; then
                  echo "ERROR: Timed out waiting ${SSM_WAIT_TIMEOUT_SECONDS}s for SSM command completion."
                  break
                fi
                sleep "${SSM_POLL_INTERVAL_SECONDS}"
                ;;
              *)
                break
                ;;
            esac
          done

          echo "SSM status: ${STATUS}"

          echo "----- STDOUT -----"
          aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${EC2_INSTANCE_ID}" --query StandardOutputContent --output text || true

          if [ "${STATUS}" != "Success" ]; then
            echo "----- STDERR -----"
            aws ssm get-command-invocation --command-id "${COMMAND_ID}" --instance-id "${EC2_INSTANCE_ID}" --query StandardErrorContent --output text || true
            exit 1
          fi
